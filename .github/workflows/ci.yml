name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff==0.5.0
      - name: Run ruff
        run: ruff check backend/ --config ruff.toml

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        working-directory: .
      - name: Run tests with coverage
        run: |
          pytest backend/tests/ \
            --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=1 \
            -v
        working-directory: .

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run eslint
        run: npm run lint
        working-directory: frontend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Run vitest
        run: npx vitest run
        working-directory: frontend
